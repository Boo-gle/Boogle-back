spring:
  profiles:
    active: local

  application:
    name: boogle

  jpa:
    hibernate:
      # ddl-auto: create # application-local.yml로 옮겨주세요.
    properties:
      hibernate:
        format_sql: true
        # --- 더미용 추가! ---
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
        # ------------------
    show-sql: false

logging:
  level:
    org.hibernate.SQL: debug
    # org.hibernate.orm.jdbc.bind: trace # 바인딩 파라미터 값 확인하고 싶을 때 켜기

management:
  health:
    elasticsearch:
      enabled: false # ES가 꺼져 있어도 헬스체크 경고를 띄우지 않음

search:
  es:
    enabled: true