spring:
  profiles:
    default: local

  main:
    web-application-type: none

  application:
    name: boogle-app

  data:
    elasticsearch:
      repositories:
        enabled: false

  jpa:
    hibernate:
      # ddl-auto: create # application-local.yml로 옮겨주세요.
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always # 배치가 실행될 때 필요한 메타 테이블들을 자동 생성해줌
    job:
      enabled: true # jenkins로 해당 잡을 실행하려면 enabled의 값이 true여야 함
      name: bookSyncJob

logging:
  config: classpath:logback-spring.xml # 로그백 설정 파일 위치 지정
  level:
    org.hibernate.SQL: debug
    # org.hibernate.orm.jdbc.bind: trace # 바인딩 파라미터 값 확인하고 싶을 때 켜기
    org.springframework.batch: info
    # 배치 실행 흐름을 보기 위해 추가

management:
  health:
    elasticsearch:
      enabled: false # ES가 꺼져 있어도 헬스체크 경고를 띄우지 않음

search:
  es:
    enabled: true