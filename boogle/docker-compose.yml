version: '3.8'

services:
  # 1. 데이터베이스 (PostgreSQL) - 모든 팀원 공통
  db:
    image: postgres:16
    container_name: boogle-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. 검색 엔진 (Elasticsearch) - ES 담당자용
  elasticsearch:
    # image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boogle-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false # 머신러닝 기능 off
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 램 512MB 제한 (팀원 배려)
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./synonyms.txt:/usr/share/elasticsearch/config/synonyms.txt

  # 3. 데이터 시각화 도구 (Kibana)
  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.3
    container_name: boogle-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200 # ES 서버 연결
    ports:
      - "5601:5601" # 키바나 접속 포트
    depends_on:
      - elasticsearch # ES가 먼저 켜져야 키바나가 실행됨

volumes:
  pgdata:
  esdata: